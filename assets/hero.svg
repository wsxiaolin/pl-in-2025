<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%" role="img" aria-label="pl · in 2025 — a photography gallery that renders Physics Lab community posts into polaroid-style prints.">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#FAF4E8"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#F0E8D6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bgGrad)"/>
  <rect width="1200" height="480" fill="url(#dotGrid)" opacity="0.6"/>

  <!-- Top-left brand mark -->
  <g transform="translate(60, 56)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#D97706" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#D97706"/>
    <text x="26" y="6" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#6B665C" letter-spacing="2">PHYSICS · LAB · COMMUNITY</text>
  </g>

  <!-- Top-right year badge -->
  <g transform="translate(1140, 56)">
    <rect x="-90" y="-16" width="90" height="32" rx="16" fill="#FFFFFF" stroke="#E8DFCC"/>
    <text x="-45" y="5" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" font-weight="600" fill="#2C2A26">2025</text>
  </g>

  <!-- Main title block -->
  <g transform="translate(60, 150)">
    <text font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="84" font-weight="800" fill="#2C2A26" letter-spacing="-2">
      <tspan x="0" y="0">pl · in</tspan>
      <tspan x="0" y="100" fill="url(#amberGrad)">2025</tspan>
    </text>
    <text x="0" y="160" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#6B665C">
      A photography gallery that renders Physics Lab community
    </text>
    <text x="0" y="190" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#6B665C">
      posts into polaroid-style prints — fully automated.
    </text>
  </g>

  <!-- Polaroid stack illustration on the right -->
  <g transform="translate(760, 110)" filter="url(#softShadow)">
    <!-- Back polaroid (sky) -->
    <g transform="rotate(8 200 150)">
      <rect x="40" y="20" width="280" height="320" rx="6" fill="#FFFFFF" stroke="#E8DFCC"/>
      <rect x="60" y="40" width="240" height="220" fill="url(#skyGrad)" opacity="0.85"/>
      <!-- physics motif: orbit -->
      <ellipse cx="180" cy="150" rx="80" ry="30" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>
      <circle cx="180" cy="150" r="10" fill="#FFFFFF"/>
      <circle cx="260" cy="135" r="4" fill="#FCD34D"/>
      <text x="180" y="300" text-anchor="middle" font-family="'Caveat', 'Bradley Hand', cursive" font-size="18" fill="#6B665C">orbit · 03-14</text>
    </g>
    <!-- Middle polaroid (amber) -->
    <g transform="rotate(-4 200 150)">
      <rect x="20" y="40" width="280" height="320" rx="6" fill="#FFFFFF" stroke="#E8DFCC"/>
      <rect x="40" y="60" width="240" height="220" fill="url(#amberGrad)" opacity="0.85"/>
      <!-- physics motif: pendulum -->
      <line x1="160" y1="80" x2="160" y2="180" stroke="#FFFFFF" stroke-width="1.5"/>
      <circle cx="160" cy="190" r="14" fill="#FFFFFF"/>
      <path d="M 100 240 Q 160 260 220 240" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.7"/>
      <text x="160" y="320" text-anchor="middle" font-family="'Caveat', 'Bradley Hand', cursive" font-size="18" fill="#6B665C">pendulum · 03-12</text>
    </g>
    <!-- Front polaroid (ink) -->
    <g transform="rotate(2 200 150)">
      <rect x="0" y="60" width="280" height="320" rx="6" fill="#FFFFFF" stroke="#E8DFCC"/>
      <rect x="20" y="80" width="240" height="220" fill="#2C2A26"/>
      <!-- physics motif: circuit / waveform -->
      <polyline points="40,200 80,200 90,160 110,160 120,220 140,220 150,180 170,180 180,200 240,200" fill="none" stroke="#FCD34D" stroke-width="2"/>
      <circle cx="60" cy="120" r="3" fill="#BAE6FD"/>
      <circle cx="220" cy="120" r="3" fill="#BAE6FD"/>
      <line x1="60" y1="120" x2="220" y2="120" stroke="#BAE6FD" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="140" y="340" text-anchor="middle" font-family="'Caveat', 'Bradley Hand', cursive" font-size="18" fill="#6B665C">waveform · 03-10</text>
    </g>
  </g>

  <!-- Bottom pipeline hint -->
  <g transform="translate(60, 410)">
    <text font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#6B665C">
      <tspan fill="#D97706" font-weight="600">JSON</tspan>
      <tspan dx="8">→</tspan>
      <tspan dx="8">Playwright</tspan>
      <tspan dx="8">→</tspan>
      <tspan dx="8">Aliyun OSS</tspan>
      <tspan dx="8">→</tspan>
      <tspan dx="8">WASM query</tspan>
      <tspan dx="8">→</tspan>
      <tspan dx="8" fill="#0EA5E9" font-weight="600">polaroid gallery</tspan>
    </text>
  </g>
</svg>