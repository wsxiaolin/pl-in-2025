name: playwright-checks

on:
  pull_request:
    branches: [main, dev, feature/**]
  workflow_dispatch:
  push:
    branches: [main, dev, feature/**]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  test:
    name: run playwright checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: |
          npm run dev > /dev/null 2>&1 &
          for i in $(seq 1 60); do
            curl -s http://localhost:5173 > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Playwright tests chromium
        run: npx playwright test --config scripts/tests/playwright.config.ts --project=chromium
        env:
          CI: true

      # - name: Run Playwright tests firefox
      #   run: npx playwright test --config scripts/tests/playwright.config.ts --project=firefox
      #   env:
      #     CI: true

      # - name: Run Playwright tests webkit
      #   run: npx playwright test --config scripts/tests/playwright.config.ts --project=webkit
      #   env:
      #     CI: true

      - name: Kill dev server
        if: always()
        run: pkill -f "vite" || true

      - name: Upload all test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: scripts/tests/reports/
          retention-days: 7